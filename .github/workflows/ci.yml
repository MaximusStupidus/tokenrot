name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Syntax check
        run: node --check bin/burnrate.js
      - name: Test
        run: npm test
      - name: Demo renders
        run: node bin/burnrate.js --demo > /dev/null
